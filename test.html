<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 ขอคืนดี 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff7fb;
    background-image:
    radial-gradient(circle at top left,#ffd6e7 0%,transparent 40%),
    radial-gradient(circle at bottom right,#ffe8f2 0%,transparent 40%);
    position:relative;
}

/* การ์ด */

.container{
    width:500px;
    max-width:90%;
    background:#fff;
    border-radius:30px;
    padding:50px 40px;
    text-align:center;
    box-shadow:0 15px 40px rgba(255,120,170,.18);
    animation:show .8s;
    z-index:5;
}

@keyframes show{
from{
    opacity:0;
    transform:translateY(30px);
}
to{
    opacity:1;
    transform:translateY(0);
}
}

.icon{
    font-size:70px;
    margin-bottom:15px;
}

h1{
    color:#ff5f92;
    font-size:42px;
}

p{
    margin-top:18px;
    color:#666;
    font-size:20px;
    line-height:1.9;
}

/* ปุ่ม */

button{
    margin-top:35px;
    padding:16px 45px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:#ff7ea9;
    color:white;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 8px 20px rgba(255,126,169,.35);
}

button:hover{
    transform:translateY(-4px);
    background:#ff5f92;
}

/* Popup */

.popup{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,.45);
    backdrop-filter:blur(6px);
    z-index:999;
}

.box{
    width:650px;
    max-width:90%;
    background:white;
    border-radius:30px;
    padding:45px;
    text-align:center;
    box-shadow:0 15px 45px rgba(0,0,0,.15);
    animation:popup .4s;
}

@keyframes popup{
from{
    transform:scale(.8);
    opacity:0;
}
to{
    transform:scale(1);
    opacity:1;
}
}

.box h2{
    color:#ff5f92;
    font-size:36px;
    margin-bottom:20px;
}

.box p{
    color:#666;
    font-size:20px;
    line-height:2;
}

/* หัวใจ */

.heart{
    position:fixed;
    bottom:-40px;
    font-size:28px;
    pointer-events:none;
    animation:float 6s linear forwards;
}

@keyframes float{
0%{
    transform:translateY(0) scale(.8);
    opacity:0;
}
20%{
    opacity:1;
}
100%{
    transform:translateY(-120vh) scale(1.8);
    opacity:0;
}
}

/* ดาว */

.star{
    position:absolute;
    color:#ffb3cf;
    animation:blink 3s infinite;
}

@keyframes blink{
0%,100%{opacity:.2;}
50%{opacity:.8;}
}

</style>

</head>

<body>

<div class="container">

<div class="icon">🐻💖</div>

<h1>ถึงแป้งงง</h1>

<p>
เค้ามีอะไรอยากบอกเธอ...<br>
ช่วยกดปุ่มด้านล่างได้ไหม 🤍
</p>

<button id="loveBtn" onclick="startLove();this.style.display='none';">
กดตรงนี้ ❤️
</button>

</div>

<!-- Popup -->

<div class="popup" id="popup">

<div class="box">

<h2>🌸 ขอคืนดีนะ 🌸</h2>

<p>

เค้าขอโทษจริง ๆ นะ 🤍<br><br>

เค้ารู้ว่าทำให้เธอเสียใจ<br>
และเค้าสัญญาว่าจะพยายามเป็นคนที่ดีกว่าเดิม<br><br>

ถ้าเธอยังให้โอกาสเค้า...<br>
เค้าจะดูแลหัวใจของเธอให้ดีที่สุด 💕<br><br>

รักเธอเสมอนะ ❤️

</p>

<button onclick="closePopup()">
ตกลง 💖
</button>

</div>

</div>

<script>

/* ดาว */

for(let i=0;i<30;i++){

let s=document.createElement("div");

s.className="star";

s.innerHTML="✨";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.fontSize=(Math.random()*12+10)+"px";

s.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(s);

}

/* หัวใจ */

function createHeart(){

const h=document.createElement("div");

h.className="heart";

const hearts=["❤️","💖","💕","💗"];

h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

h.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},6000);

}

setInterval(createHeart,900);

/* เริ่มแอนิเมชัน */

function startLove(){

let count=0;

let timer=setInterval(()=>{

createHeart();

count++;

if(count>=60){

clearInterval(timer);

setTimeout(()=>{

document.getElementById("popup").style.display="flex";

},800);

}

},90);

}

/* ปิด Popup */

function closePopup(){

document.getElementById("popup").style.display="none";

}

</script>

</body>
</html>
